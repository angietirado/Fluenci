<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Gradient for F letter - dark blue (left) to teal/aqua (right) -->
    <linearGradient id="fGradient" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:#1E3A8A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gradient for L letter - teal/aqua -->
    <linearGradient id="lGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22D3EE;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gradient for arrow - teal/aqua -->
    <linearGradient id="arrowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22D3EE;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- F Letter - Thick, rounded, stylized -->
  <path d="M 50 40 
           C 45 35, 40 40, 40 50
           L 40 90
           C 40 95, 45 100, 50 100
           L 70 100
           C 75 100, 80 95, 80 90
           L 80 75
           C 80 70, 75 65, 70 65
           L 55 65
           C 50 65, 45 60, 45 55
           L 45 50
           C 45 45, 50 40, 55 40
           L 70 40
           C 75 40, 80 35, 80 30
           L 80 25
           C 80 20, 75 15, 70 15
           L 50 15
           C 45 15, 40 20, 40 25
           Z" 
        fill="url(#fGradient)" 
        stroke="#FFB6C1" 
        stroke-width="2"
        stroke-linejoin="round"/>
  
  <!-- L Letter - Thick, rounded, stylized -->
  <path d="M 85 40
           C 80 35, 75 40, 75 50
           L 75 90
           C 75 95, 80 100, 85 100
           L 120 100
           C 125 100, 130 95, 130 90
           L 130 80
           C 130 75, 125 70, 120 70
           L 90 70
           C 85 70, 80 65, 80 60
           L 80 40
           Z" 
        fill="url(#lGradient)" 
        stroke="#FFB6C1" 
        stroke-width="2"
        stroke-linejoin="round"/>
  
  <!-- Curved Arrow - Starts top-left, curves clockwise around top, points down-right -->
  <path d="M 50 25
           Q 30 25, 20 50
           Q 10 75, 20 100
           Q 30 125, 50 125
           Q 70 125, 90 115
           Q 110 105, 120 80
           Q 130 55, 120 30
           Q 110 5, 90 15
           Q 70 25, 50 25" 
        fill="none"
        stroke="url(#arrowGradient)" 
        stroke-width="8"
        stroke-linecap="round"
        stroke-linejoin="round"/>
  
  <!-- Arrow head pointing down-right -->
  <path d="M 125 35
           L 135 25
           L 140 30
           L 130 40
           Z" 
        fill="url(#arrowGradient)" 
        stroke="#FFB6C1" 
        stroke-width="2.5"/>
</svg>
